name: Publish to NPM
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@900f221
      - name: Use Node.js
        uses: actions/setup-node@670825a
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run Tests
        run: npm run test:ci
      - name: Stage for Publish
        run: npm stage publish
